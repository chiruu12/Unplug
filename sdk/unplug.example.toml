# Unplug configuration — copy to unplug.toml and customize

[guard]
scanners = ["injection", "destructive", "leakage", "harmful"]
mode = "local"
fail_closed = true
judge_enabled = false

[limits]
max_input_chars = 50000
max_tool_calls_per_session = 100
blocked_tools = []

[pipeline.thresholds]
block = 0.8
redact = 0.5
review = 0.3

# Per-scanner overrides
[scanners.injection]
base_score = 0.85
normalize = true

[scanners.destructive]
base_score = 0.90
